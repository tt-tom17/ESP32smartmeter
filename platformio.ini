; ─────────────────────────────────────────────────────────────────────────────
;  PlatformIO-Projekt für den ESP32 Wärme-/Stromzähler-Reader
;
;  src_dir zeigt auf den Arduino-Sketch-Ordner, damit derselbe Code sowohl in der
;  Arduino-IDE als auch in PlatformIO (VSCode) gebaut werden kann.
;  secrets.h muss im Ordner zaehler-esp32/ liegen (siehe secrets.example.h).
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
src_dir = zaehler-esp32

[env:esp32dev]
; Standard-PlatformIO-Plattform (Espressif). Für die pioarduino-Variante die
; nächste Zeile auskommentieren und die pioarduino-Zeile darunter aktivieren.
platform = espressif32
; platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    knolleary/PubSubClient@^2.8

; OTA-Upload (nach dem ersten USB-Flash): Zeilen aktivieren und IP eintragen.
; upload_protocol = espota
; upload_port     = 192.168.178.217
